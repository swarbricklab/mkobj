name: scanpy_1.10

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python>=3.10
  - scanpy>=1.10
  - anndata>=0.10
  - pandas
  - numpy
  - scipy
  - h5py
  - leidenalg
  - igraph
  # Required by sc.pp.scrublet() in detect_doublets when no explicit threshold
  # is supplied (scanpy uses scikit-image's threshold_minimum to choose one).
  - scikit-image
